<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arduino → WASM compiler (iOS/WKWebView host)</title>
  <style>
    body { font: 13px system-ui, sans-serif; padding: 10px; color: #222; }
    textarea { width: 100%; height: 200px; font-family: ui-monospace, monospace; }
    pre { white-space: pre-wrap; word-break: break-all; background: #f5f5f5; padding: 8px; }
    button { font-size: 15px; padding: 6px 14px; }
  </style>
</head>
<body>
  <h3>Arduino → Intel HEX, entirely in WebAssembly</h3>
  <p id="status">Loading toolchain…</p>
  <textarea id="src">
const int led = 13;
void setup() {
  Serial.begin(9600);
  pinMode(led, OUTPUT);
  Serial.println("HELLO_AVR_WASM");
}
void loop() {
  digitalWrite(led, HIGH); delay(100);
  digitalWrite(led, LOW);  delay(100);
}
  </textarea>
  <p>
    <select id="board"><option>uno</option><option>nano</option><option>mega</option></select>
    <label><input type="checkbox" class="lib" value="Wire"> Wire</label>
    <label><input type="checkbox" class="lib" value="SPI"> SPI</label>
    <label><input type="checkbox" class="lib" value="SoftwareSerial"> SoftwareSerial</label>
    <label><input type="checkbox" class="lib" value="EEPROM"> EEPROM</label>
    &nbsp;|&nbsp;<label><input type="checkbox" id="lto"> LTO (experimental)</label>
    <button id="go" disabled>Compile</button>
  </p>
  <pre id="out"></pre>

  <!--
    Each tool is an emscripten MODULARIZE module. cc1/cc1plus export
    `createModule`; the binutils tools export the default `Module`. We load
    them one at a time and capture each global into window.__factories before
    the next overwrites it (same pattern as the assembler example).
  -->
  <script>
    window.__factories = {};
    const TOOLS = [
      ['cc1.js', 'createModule', 'cc1'],
      ['cc1plus.js', 'createModule', 'cc1plus'],
      ['lto1.js', 'createModule', 'lto1'],
      ['avr-as.js', 'Module', 'avr-as'],
      ['avr-ld.js', 'Module', 'avr-ld'],
      ['ar.js', 'Module', 'ar'],
      ['objcopy.js', 'Module', 'objcopy'],
    ];
    function loadScript(src) {
      return new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = src; s.onload = res; s.onerror = () => rej(new Error('load ' + src));
        document.body.appendChild(s);
      });
    }
    (async () => {
      for (const [file, glob, key] of TOOLS) {
        await loadScript('./dist-web/tools/' + file);
        window.__factories[key] = window[glob];
        try { delete window[glob]; } catch {}
      }
      document.getElementById('status').textContent = 'Toolchain ready.';
      document.getElementById('go').disabled = false;
    })();
  </script>
  <script src="./dist-web/recipe.js"></script>
  <script src="./arduino-pipeline.js"></script>
  <script>
    document.getElementById('go').addEventListener('click', async () => {
      const out = document.getElementById('out');
      out.textContent = 'Compiling…';
      const libraries = [...document.querySelectorAll('.lib:checked')].map((c) => c.value);
      const r = await window.compileArduino({
        source: document.getElementById('src').value,
        board: document.getElementById('board').value,
        libraries,
        lto: document.getElementById('lto').checked,
      });
      out.textContent = r.ok ? r.hex : 'COMPILE ERROR:\n' + r.log;
    });
  </script>
</body>
</html>
