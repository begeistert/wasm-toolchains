name: Release Pico

# Builds and publishes the ARM/Pico toolchain bundle (picowasm) for RP2040/RP2350.
#
#   build-arm-gcc — cc1plus + arm-as/arm-ld/objcopy (arm-none-eabi → WASM)
#   bundle-pico   — picocap harvest → dist-pico-web, verify flash-identical (blocking)
#   release       — catalog.json + picowasm.tar → Pico Release
#
# Runs ONLY on `pico-v*` tags (full build → publish) and manual workflow_dispatch
# (build + validate, no publish). The ARM toolchain build is ~hours but gha-cached.
# The AVR toolchain has its own workflow (release-avr.yml).

on:
  push:
    tags: ["pico-v*"]
  workflow_dispatch:

jobs:
  build-arm-gcc:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: crazy-max/ghaction-github-runtime@v3
      - name: Build cc1plus + binutils (arm-none-eabi → WASM)
        run: |
          docker buildx build --progress=plain \
            --cache-to=type=gha,mode=max,scope=arm-gcc \
            --cache-from=type=gha,scope=arm-gcc \
            --output=type=local,dest=dist-arm-gcc \
            src/arm-gcc
      - name: Sanity-check tools
        run: for t in cc1plus.js arm-as.js arm-ld.js objcopy.js; do test -s "dist-arm-gcc/$t"; done
      - uses: actions/upload-artifact@v4
        with: { name: dist-arm-gcc, path: dist-arm-gcc/ }

  bundle-pico:
    runs-on: ubuntu-latest
    needs: [build-arm-gcc]
    permissions: { contents: read }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/download-artifact@v4
        with: { name: dist-arm-gcc, path: dist-arm-gcc/ }
      - name: Build picocap harvest image (arduino-cli + arduino-pico + Tier-1 libs)
        run: docker build -t picocap:latest src/picocap
      - name: Harvest + build the base bundle + wireless overlay
        # Produces dist-pico-web (pico/pico2) and the sibling dist-pico-wireless
        # (pico_w/pico2w delta only — the CYW43 WiFi/BT core.a + lwip/bearssl, no
        # tools). Boards come from the target registry (targets/pico*.json).
        run: node tools/pico-wasm/harvest.cjs dist-pico-web
      - name: Verify flash-identical to native + library sketches link (base + overlay)
        run: node tools/pico-wasm/verify-pico.cjs dist-pico-web dist-pico-wireless
      - uses: actions/upload-artifact@v4
        with: { name: dist-pico-web, path: dist-pico-web/ }
      - uses: actions/upload-artifact@v4
        with: { name: dist-pico-wireless, path: dist-pico-wireless/ }

  release:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'pico-v')
    needs: [bundle-pico]
    permissions: { contents: write }
    uses: ./.github/workflows/_release.yml
    with:
      track: pico
      title: Pico
      body: |
        WebAssembly build of the ARM (RP2040/RP2350) GNU toolchain — `cc1plus`,
        `arm-as`, `arm-ld`, `objcopy` (GCC 14.3) — with the multi-board link inputs and
        header closures harvested from arduino-pico. Boards: `pico`, `pico2` (base) and
        `pico_w`, `pico2w` (wireless overlay). Compile Pico sketches to UF2 in a browser,
        WKWebView, or Node.js.

        ### Assets
        - `picowasm.tar` — the base `dist-pico-web` bundle: the ARM tools (cc1plus.wasm
          et al.), the `pico`/`pico2` templates + vfs, `manifest.json`.
        - `picowwasm.tar` — the `pico-wireless` overlay: only the delta the W boards add
          (the CYW43 WiFi/BT `core.a` + lwip/bearssl link/headers), no tools. Extract it
          ON TOP of the base; the catalog marks it `requires: pico-toolchain`. A host that
          doesn't target a W board never downloads it.
        - `catalog.json` — versioned manifest (per-asset URL + sha256 + size + requires)

        Verified flash-identical to a native `arduino-cli` build. See
        [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).
